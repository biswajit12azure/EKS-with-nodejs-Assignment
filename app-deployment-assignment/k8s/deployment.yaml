apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-world-api
  namespace: default
  labels:
    app: hello-world-api
    version: "1.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hello-world-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: hello-world-api
    spec:
      containers:
        - name: hello-world-api
          # Replace with your ECR image URI: <account-id>.dkr.ecr.<region>.amazonaws.com/hello-world-api:<tag>
          image: ACCOUNT_ID.dkr.ecr.REGION.amazonaws.com/hello-world-api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              protocol: TCP
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3000"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
      terminationGracePeriodSeconds: 30
